<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Junaed Pottery</title>
    <!-- Use Google Fonts for UI text -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <!-- Top UI -->
        <div class="top-bar">
            <button id="btn-undo" class="icon-btn">↺</button>
            <div id="phase-title">PHASE: SCULPT</div>
            <button id="btn-sound" class="icon-btn">🔊</button>
        </div>

        <!-- Canvas Area -->
        <canvas id="gameCanvas"></canvas>

        <!-- Tooltip overlay -->
        <div id="tooltip" class="tooltip">👆 Drag to Shape</div>

        <!-- Bottom UI -->
        <div class="bottom-bar">
            <button id="btn-fire">FIRE POT 🔥</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
