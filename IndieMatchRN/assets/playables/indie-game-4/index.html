<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pixel Match</title>
    <!-- Use Google Fonts for Retro Pixel Look -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <!-- CRT scanline effect overlay -->
        <div class="crt-overlay"></div>
        
        <header>
            <h1 class="glitch-text" data-text="PIXEL MATCH">PIXEL MATCH</h1>
            <p>Compatibility Test</p>
        </header>

        <div class="photo-section">
            <!-- Box 1 -->
            <div class="photo-box" id="box-p1">
                <input type="file" id="input-p1" accept="image/*" class="hidden-input">
                <div class="upload-ui">
                    <span class="plus-icon">+</span>
                    <span class="label-text">P1</span>
                </div>
            </div>

            <!-- Heart Divider -->
            <div class="heart-divider">❤</div>

            <!-- Box 2 -->
            <div class="photo-box" id="box-p2">
                <input type="file" id="input-p2" accept="image/*" class="hidden-input">
                <div class="upload-ui">
                    <span class="plus-icon">+</span>
                    <span class="label-text">P2</span>
                </div>
            </div>
        </div>

        <div class="instruction">
            Tap boxes to upload photos
        </div>

        <!-- Result / Analyze Section -->
        <div class="action-section">
            <!-- Overlay that shows the result percentage -->
            <div id="result-overlay" class="hidden">
                <span id="match-score">0%</span>
            </div>
            
            <button id="btn-analyze" disabled>
                ANALYZE LOVE
            </button>
        </div>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
